[package]
name = "libdd-crashtracker"
description = "Detects program crashes and reports them to datadog backend."
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-crashtracker"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-crashtracker"
edition.workspace = true
version = "1.0.0"
rust-version.workspace = true
license.workspace = true
autobenches = false

[lib]
crate-type = ["lib"]
bench = false

[[bin]]
name = "crashtracker-receiver"
path = "src/bin/crashtracker_receiver.rs"
bench = false
required-features = ["std", "receiver"]

[[bench]]
name = "main"
harness = false
path = "benches/main.rs"
required-features = ["std", "benchmarking"]

[features]
default = ["std", "collector", "receiver", "collector_windows"]
std = [
  "dep:anyhow",
  "dep:blazesym",
  "dep:chrono",
  "dep:errno",
  "dep:http",
  "dep:libc",
  "dep:libdd-common",
  "dep:libdd-libunwind-sys",
  "dep:libdd-telemetry",
  "dep:nix",
  "dep:os_info",
  "dep:page_size",
  "dep:portable-atomic",
  "dep:rand",
  "dep:schemars",
  "dep:serde",
  "dep:serde_json",
  "dep:symbolic-common",
  "dep:symbolic-demangle",
  "dep:thiserror",
  "thiserror/std",
  "dep:tokio",
  "dep:uuid",
  "dep:windows",
  "serde/std",
]
# Enables the in-process collection of crash-info
collector = ["std"]
# Enables the signal-safe in-process collection of crash-info
collector_signal-safe = ["dep:heapless", "dep:libc", "dep:rustix", "dep:serde", "dep:serde-json-core", "dep:thiserror"]
# Enables the use of this library to receiver crash-info from a suitable collector
receiver = ["std"]
# Enables the collection of crash-info on Windows
collector_windows = ["std"]
generate-unit-test-files = []
# Enables benchmark functionality
benchmarking = ["std", "generate-unit-test-files"]
# Enables C++ bindings via cxx
cxx = ["std", "dep:cxx", "dep:cxx-build"]

[target.'cfg(unix)'.dependencies]
# Should be kept in sync with the libdatadog symbolizer crate (also using blasesym)
blazesym = { version = "=0.2.3", optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
libdd-libunwind-sys = { version = "1.0.2", optional = true }

[dependencies]
anyhow = { version = "1.0", optional = true }
chrono = { version = "0.4", default-features = false, features = ["std", "clock", "serde"], optional = true }
cxx = { version = "1.0", optional = true }
errno = { version = "0.3", optional = true }
heapless = { version = "0.8", default-features = false, features = ["serde"], optional = true }
libdd-common = { version = "5.0.0", path = "../libdd-common", optional = true }
libdd-telemetry = { version = "5.0.1", path = "../libdd-telemetry", optional = true }
http = { version = "1.1", optional = true }
libc = { version = "0.2", default-features = false, optional = true }
nix = { version = "0.29", features = ["poll", "signal", "socket"], optional = true }
os_info = { version = "3.14.0", optional = true }
page_size = { version = "0.6.0", optional = true }
portable-atomic = { version = "1.6.0", features = ["serde"], optional = true }
rand = { version = "0.8.5", optional = true }
rustix = { version = "=1.1.4", default-features = false, features = ["event", "fs", "mm", "pipe", "process", "runtime", "stdio", "thread", "time"], optional = true }
schemars = { version = "0.8.21", optional = true }
serde = { version = "1.0", default-features = false, features = ["derive"], optional = true }
serde-json-core = { version = "0.6", default-features = false, optional = true }
serde_json = { version = "1.0", optional = true }
symbolic-demangle = { version = "12.8.0", default-features = false, features = ["rust", "cpp", "msvc"], optional = true }
symbolic-common = { version = "12.8.0", default-features = false, optional = true }
tokio = { version = "1.23", features = ["rt", "macros", "io-std", "io-util"], optional = true }
uuid = { version = "1.4.1", features = ["v4", "serde"], optional = true }
thiserror = { version = "2", default-features = false, optional = true }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.59.0", features = ["Win32_System_Diagnostics_Debug", "Win32_System_Diagnostics_ToolHelp", "Win32_System_ErrorReporting", "Win32_System_Kernel", "Win32_System_ProcessStatus", "Win32_System_Registry", "Win32_System_SystemInformation", "Win32_System_SystemServices", "Win32_System_Threading", "Win32_Security"], optional = true }

[dev-dependencies]
criterion = { version = "0.5.1" }
goblin = "0.9.3"
serde_json = "1.0"
tempfile = { version = "3.13" }

[build-dependencies]
# If we use a newer version of cc, CI fails on alpine.
cc = "1.1.31"
cxx-build = { version = "1.0", optional = true }
# Use default-features = false to avoid pulling in the `https` feature (rustls/aws-lc-rs/aws-lc-sys)
# in the build-script context. The build script only needs cc_utils, which has no TLS dependency.
# Without this, aws-lc-sys gets compiled twice: once for the normal dep graph and once for the
# build-script dep graph (Cargo resolver v2 keeps these contexts separate).
libdd-common = { version = "5.0.0", path = "../libdd-common", default-features = false }

[lints.clippy]
std_instead_of_alloc = "warn"
std_instead_of_core = "warn"
