[package]
name = "libdd-library-config"
version = "3.0.0"
description = "Configuration management library for Datadog products."
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-library-config"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-library-config"
edition = "2021"
license.workspace = true

[lib]
crate-type = ["lib"]
bench = false

[features]
default = ["process-context-writer"]
otel-thread-ctx = ["process-context-writer"]
process-context-reader = []
process-context-writer = []

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_yaml = "0.9.34"
prost = "0.14.1"
anyhow.workspace = true
rand = "0.8.3"
rmp = "0.8.14"
rmp-serde = "1.3.0"

libdd-trace-protobuf = { version = "4.0.0", path = "../libdd-trace-protobuf" }

[dev-dependencies]
tempfile = { version = "3.3" }
serial_test = "3.2"

[target.'cfg(target_os = "linux")'.dependencies]
memfd = { version = "0.6" }
libc = "0.2"

[lints.clippy]
std_instead_of_alloc = "warn"
std_instead_of_core = "warn"
