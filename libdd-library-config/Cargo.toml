[package]
name = "libdd-library-config"
version = "1.1.0"
description = "Configuration management library for Datadog products."
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-library-config"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-library-config"
edition = "2021"
license.workspace = true

[lib]
crate-type = ["lib"]
bench = false

[features]
default = ["std"]
std = [
    "serde/std",
    "anyhow/std",
    "yaml-peg/std",
    "dep:prost",
    "dep:rand",
    "dep:rmp",
    "dep:rmp-serde",
    "dep:libdd-trace-protobuf",
    "dep:memfd",
    "dep:rustix",
]

[dependencies]
serde = { version = "1.0", default-features = false, features = ["derive", "alloc"] }
yaml-peg = { version = "1.0.9", default-features = false, features = ["serde"] }
prost = { version = "0.14.1", optional = true }
anyhow = { version = "1.0", default-features = false }

rand = { version = "0.8.3", optional = true }
rmp = { version = "0.8.14", optional = true }
rmp-serde = { version = "1.3.0", optional = true }

libdd-trace-protobuf = { version = "2.0.0", path = "../libdd-trace-protobuf", optional = true }

[dev-dependencies]
tempfile = { version = "3.3" }
serial_test = "3.2"

[target.'cfg(unix)'.dependencies]
memfd = { version = "0.6", optional = true }
rustix = { version = "1.1.3", features = ["param", "mm", "process", "fs", "time"], optional = true }
