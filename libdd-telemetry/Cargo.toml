[package]
name = "libdd-telemetry"
version= "5.0.1"
description = "Telemetry client allowing to send data as described in https://docs.datadoghq.com/tracing/configure_data_security/?tab=net#telemetry-collection"
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-telemetry"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-telemetry"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
bench = false

[[example]]
name = "signal_safe_metrics"
required-features = ["signal-safe"]

[[example]]
name = "tm-metrics-worker-test"
required-features = ["std"]

[[example]]
name = "tm-ping"
required-features = ["std"]

[[example]]
name = "tm-send-sketch"
required-features = ["std"]

[[example]]
name = "tm-worker-test"
required-features = ["std"]

[features]
default = ["std", "tracing"]
std = [
    "dep:anyhow",
    "dep:async-trait",
    "dep:base64",
    "dep:bytes",
    "dep:futures",
    "dep:hashbrown",
    "dep:http",
    "dep:http-body-util",
    "dep:libc",
    "dep:libdd-common",
    "dep:libdd-ddsketch",
    "dep:libdd-shared-runtime",
    "dep:serde",
    "dep:serde_json",
    "dep:sys-info",
    "dep:tokio",
    "dep:tokio-util",
    "dep:tracing",
    "dep:uuid",
    "dep:winver",
]
tracing = ["std", "tracing/std"]
https = ["std", "libdd-common/https", "libdd-shared-runtime/https"]
fips = ["std", "libdd-common/fips", "libdd-shared-runtime/fips"]
signal-safe = ["dep:libdd-http-client-lite"]

[dependencies]
anyhow = { version = "1.0", optional = true }
async-trait = { version = "0.1", optional = true }
base64 = { version = "0.22", optional = true }
futures = { version = "0.3", default-features = false, optional = true }
http-body-util = { version = "0.1", optional = true }
http = { version = "1", optional = true }
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
tokio = { version = "1.23", features = ["sync", "io-util"], optional = true }
tokio-util = { version = "0.7", features = ["codec"], optional = true }
tracing = { version = "0.1", default-features = false, optional = true }
uuid = { version = "1.3", features = ["v4"], optional = true }
hashbrown = { version = "0.15", optional = true }
bytes = { version = "1.4", optional = true }
libdd-common = { version = "4.2.0", path = "../libdd-common", default-features = false, optional = true }
libdd-shared-runtime = { version = "1.0.0", path = "../libdd-shared-runtime", default-features = false, optional = true }
libdd-ddsketch = { version = "1.0.1", path = "../libdd-ddsketch", optional = true }
libdd-http-client-lite = { version = "35.0.0", path = "../libdd-http-client-lite", features = ["rustix-tcp"], optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
sys-info = { version = "0.9.0", optional = true }

[target."cfg(unix)".dependencies]
libc = { version = "0.2.176", optional = true }

[target."cfg(windows)".dependencies]
winver = { version = "1.0.0", optional = true }

[dev-dependencies]
tracing-subscriber = "0.3.22"
tokio = { version = "1.23", features = ["sync", "io-util", "rt-multi-thread"] }
libdd-common = { path = "../libdd-common", features = ["test-utils"] }
httpmock = "0.8.0-alpha.1"
serde_json = "1.0"
