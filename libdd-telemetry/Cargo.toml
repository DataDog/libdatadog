[package]
name = "libdd-telemetry"
version= "6.0.0"
description = "Telemetry client allowing to send data as described in https://docs.datadoghq.com/tracing/configure_data_security/?tab=net#telemetry-collection"
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-telemetry"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-telemetry"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
bench = false

[features]
default = ["tracing"]
tracing = ["tracing/std"]
https = ["libdd-common/https", "libdd-shared-runtime/https"]
fips = ["libdd-common/fips", "libdd-shared-runtime/fips"]

[dependencies]
anyhow.workspace = true
async-trait = "0.1"
base64 = "0.22"
futures = { version = "0.3", default-features = false }
http = "1"
serde = { workspace = true, features = ["derive"] }
serde_json = { version = "1.0" }
tokio = { workspace = true, features = ["sync", "io-util"] }
tokio-util = { version = "0.7", features = ["codec"] }
tracing = { workspace = true, default-features = false }
uuid = { version = "1.3", features = ["v4"] }
hashbrown = "0.15"
bytes = "1.4"
libdd-capabilities = { version = "2.1.0", path = "../libdd-capabilities" }
libdd-common = { version = "5.1.0", path = "../libdd-common", default-features = false }
libdd-shared-runtime = { version = "2.0.0", path = "../libdd-shared-runtime", default-features = false }
libdd-ddsketch = { version = "1.1.0", path = "../libdd-ddsketch" }
web-time = "1" # cross-platform Instant/SystemTime; shims via js-sys on wasm32

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
sys-info = { version = "0.9.0" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
uuid = { version = "1", features = ["js"] }

[target."cfg(unix)".dependencies]
libc = "0.2.176"

[target."cfg(windows)".dependencies]
winver = "1.0.0"

[dev-dependencies]
tracing-subscriber = "0.3.22"
tokio = { version = "1.23", features = ["sync", "io-util", "rt-multi-thread"] }
libdd-capabilities-impl = { path = "../libdd-capabilities-impl" }
libdd-common = { path = "../libdd-common", features = ["test-utils"] }
httpmock = "0.8.0-alpha.1"
