# Cross-repo benchmark trigger — PROTOTYPE (2-hop dynamic child pipeline).
#
# Topology under test:
#
#   generate_child (script)            -> emits child.yml (the trigger to dd-trace-py)
#     └─ run_child (trigger:include)   -> child pipeline in THIS project, strategy: depend   [HOP 1]
#          └─ child.yml: trigger_dd_trace_py
#               └─ trigger:project dd-trace-py, strategy: depend                              [HOP 2]
#                    └─ dd-trace-py `test` job (passes/fails on SHOULD_FAIL)
#
# Goals of this prototype:
#   1. Confirm the downstream dd-trace-py pass/fail mirrors all the way back to run_child.
#   2. Confirm variables set on run_child reach the dd-trace-py `test` job. A bridge job's
#      variables: are injected into its child pipeline, so child.yml can forward them
#      downstream by reference. Those variables are how we will later drive patches and
#      PR comments.

# HOP 0: a normal runner job. It is the only place we can run a script, so this is
# where the (future) label check lives and where we emit the trigger we want to run.
generate_child:
  tags: ["arch:amd64"]
  image: registry.ddbuild.io/images/mirror/alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: manual
      allow_failure: true
  script:
    # Emit the child pipeline. The variables below are forwarded BY REFERENCE: they
    # resolve against the child pipeline scope, which inherits run_child's variables:.
    - |
      cat > child.yml <<'YAML'
      trigger_dd_trace_py:
        variables:
          SOURCE_REPO: "$SOURCE_REPO"
          SOURCE_BRANCH: "$SOURCE_BRANCH"
          PATCH_MODE: "$PATCH_MODE"
          SHOULD_FAIL: "$SHOULD_FAIL"
        trigger:
          project: DataDog/apm-reliability/dd-trace-py
          strategy: depend
          branch: "$DD_TRACE_PY_BRANCH"
      YAML
    - echo "----- generated child.yml -----"
    - cat child.yml
  artifacts:
    paths:
      - child.yml

# HOP 1: child pipeline in THIS project from the generated artifact.
# strategy: depend makes this job depend on the child pipeline's status, which in
# turn (HOP 2) depends on dd-trace-py. This is the propagation we are validating.
#
# variables: set here are injected into the child pipeline, so child.yml's
# trigger_dd_trace_py can forward them on to dd-trace-py. This is the variable path we
# will later use to carry patch mode, PR comment context, etc.
run_child:
  needs:
    - job: generate_child
      artifacts: true
  variables:
    SOURCE_REPO: "DataDog/libdatadog"
    SOURCE_BRANCH: "$CI_COMMIT_REF_NAME"
    PATCH_MODE: "none"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: manual
      allow_failure: true
  trigger:
    include:
      - artifact: child.yml
        job: generate_child
    strategy: depend
