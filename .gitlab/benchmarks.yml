variables:
  BASE_CI_IMAGE: registry.ddbuild.io/ci/benchmarking-platform:libdatadog-benchmarks
  # The Dockerfile to this image is located at:
  # https://github.com/DataDog/benchmarking-platform/tree/libdatadog/benchmarks

benchmarks:
  tags: ["runner:apm-k8s-tweaked-metal"]
  needs:
    # Not created on main/release/hotfix (full suite) -- hence optional.
    - job: compute_impacted_crates
      artifacts: true
      optional: true
  image:
    name: $BASE_CI_IMAGE
  rules:
    # Don't run on merge-queue working branches
    - if: '$CI_COMMIT_BRANCH =~ /^mq-working-branch-/'
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      interruptible: false
    - interruptible: true
  timeout: 80m
  script:
    # Decide which crates to benchmark. Runs first, while $CI_PROJECT_DIR is the libdatadog checkout.
    # BENCH_PACKAGES (consumed by benchmark/run_benchmarks_ci.sh) is empty for a full-workspace run
    # and a space-separated crate list for a scoped run. main always runs the full suite; a PR runs
    # only the impacted crates. AFFECTED_CRATES / IMPACTED_STATUS come from the
    # compute_impacted_crates dotenv artifact and changed_files.txt is its file artifact.
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        echo "Full benchmark suite (main)."
        export BENCH_PACKAGES=""
      elif [ "${IMPACTED_STATUS:-}" != "success" ] || [ -z "${AFFECTED_CRATES:-}" ]; then
        echo "Impacted crates undetermined -> full benchmark suite."
        export BENCH_PACKAGES=""
      elif grep -qE '^(benchmark/|\.gitlab/benchmarks\.yml|\.gitlab/impacted-crates\.yml)' changed_files.txt 2>/dev/null; then
        echo "Benchmark infrastructure changed -> full benchmark suite."
        export BENCH_PACKAGES=""
      elif ! BENCH_CRATES=$(set -o pipefail; cargo metadata --no-deps --format-version 1 \
             | jq -c '[.packages[] | select(any(.targets[]?; .kind[]? == "bench")) | .name]'); then
        echo "Could not detect benchmarked crates -> full benchmark suite."
        export BENCH_PACKAGES=""
      else
        IMPACTED=$(jq -nr --argjson a "$AFFECTED_CRATES" --argjson b "$BENCH_CRATES" \
          '($a - ($a - $b)) | .[]' | tr '\n' ' ')
        if [ -z "$IMPACTED" ]; then
          echo "No benchmarked crates impacted by this PR -> skipping benchmarks."
          exit 0
        fi
        export BENCH_PACKAGES="$IMPACTED"
        echo "Benchmarking impacted crates: $BENCH_PACKAGES"
      fi
    - export ARTIFACTS_DIR="$(pwd)/reports" && (mkdir "${ARTIFACTS_DIR}" || :)
    - git clone --branch libdatadog/benchmarks https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.ddbuild.io/DataDog/benchmarking-platform /platform && cd /platform
    - ./steps/capture-hardware-software-info.sh
    - |
      SCRIPT_DIR="$(pwd)/steps"
      source ./steps/config-benchmark-env.sh

      checkout_source_with_submodules() {
        local repo_url=$1
        local dest=$2
        local target=$3

        if [[ -d "${dest}" ]]; then
          return
        fi

        git clone "${repo_url}" "${dest}"
        git -C "${dest}" checkout "${target}"
        git -C "${dest}" submodule update --init --recursive
      }

      checkout_source_with_submodules "${UPSTREAM_REPO_URL}" "${CANDIDATE_PATH}" "${CANDIDATE_IDENTIFIER}"

      # Refresh benchmark-platform's derived baseline after candidate checkout.
      VERBOSE="true" source ./steps/config-benchmark-env.sh
      checkout_source_with_submodules "${UPSTREAM_REPO_URL}" "${BASELINE_PATH}" "${BASELINE_IDENTIFIER}"
    - ./steps/run-benchmarks.sh
    - ./steps/analyze-results.sh
    - "./steps/upload-results-to-s3.sh || :"
    - "./steps/upload-results-to-benchmarking-api.sh || :"
    - "./steps/post-pr-comment.sh || :"
  artifacts:
    name: "reports"
    paths:
      - reports/
    expire_in: 3 months
  variables:
    UPSTREAM_PROJECT_ID: $CI_PROJECT_ID # The ID of the current project. This ID is unique across all projects on the GitLab instance.
    UPSTREAM_PROJECT_NAME: $CI_PROJECT_NAME # libdatadog
    UPSTREAM_BRANCH: $CI_COMMIT_REF_NAME # The branch or tag name for which project is built.
    UPSTREAM_COMMIT_SHA: $CI_COMMIT_SHA # The commit revision the project is built for.
    UPSTREAM_REPO_URL: "https://github.com/DataDog/libdatadog" # The HTTP URL to the project's repository.

    KUBERNETES_SERVICE_ACCOUNT_OVERWRITE: libdatadog
    FF_USE_LEGACY_KUBERNETES_EXECUTION_STRATEGY: "true"
