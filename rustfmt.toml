unstable_features = true

ignore = [
  # embedded project waiting for upstream fixes
  "datadog-ipc/tarpc/",
  # @generated by prost-build from a vendored .proto file that must stay byte-for-byte identical
  # to its upstream source; wrapping is dictated by that source, not this repo's style
  "libdd-metrics-v3/tests/pb/mod.rs",
]

format_macro_matchers = true
format_code_in_doc_comments=true
wrap_comments = true
max_width=100
comment_width=100
doc_comment_code_block_width=100
