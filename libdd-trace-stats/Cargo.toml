[package]
name = "libdd-trace-stats"
version = "5.0.0"
description = "This crate provides utilities to compute stats from Datadog traces."
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-trace-stats"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-trace-stats"
rust-version.workspace = true
edition.workspace = true
license.workspace = true
autobenches = false

[dependencies]
arc-swap.workspace = true
anyhow = "1.0"
libdd-capabilities = { path = "../libdd-capabilities", version = "2.1.0" }
libdd-common = { version = "5.1.0", path = "../libdd-common", default-features = false }
libdd-ddsketch = { version = "1.0.1", path = "../libdd-ddsketch" }
libdd-dogstatsd-client = { version = "3.0.0", path = "../libdd-dogstatsd-client", default-features = false, optional = true }
libdd-shared-runtime = { version = "1.0.0", path = "../libdd-shared-runtime", default-features = false }
libdd-telemetry = { version = "5.0.1", path = "../libdd-telemetry", default-features = false, optional = true }
libdd-trace-protobuf = { version = "3.0.2", path = "../libdd-trace-protobuf" }
libdd-trace-obfuscation = { version = "4.0.0", path = "../libdd-trace-obfuscation", default-features = false }
libdd-trace-utils = { version = "8.0.0", path = "../libdd-trace-utils", default-features = false }
hashbrown = { version = "0.15" }
http = "1.1"
rmp-serde = "1.3.0"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.23", features = ["macros", "time"], default-features = false }
tokio-util = "0.7.11"
tracing = { version = "0.1", default-features = false }
async-trait = "0.1.85"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libdd-capabilities-impl = { version = "2.0.0", path = "../libdd-capabilities-impl", default-features = false }

[lib]
bench = false

[[bench]]
name = "main"
harness = false
path = "benches/main.rs"

[dev-dependencies]
criterion = "0.5.1"
httpmock = "0.8.0-alpha.1"
libdd-trace-utils = { path = "../libdd-trace-utils", features = ["test-utils"] }
rand = "0.8.5"
tokio = { version = "1.23", features = ["rt-multi-thread", "macros", "test-util", "time"], default-features = false }

[features]
default = ["https"]
stats-obfuscation = []
telemetry = ["libdd-telemetry"]
dogstatsd = ["libdd-dogstatsd-client"]
https = ["libdd-common/https", "libdd-capabilities-impl/https", "libdd-shared-runtime/https","libdd-telemetry?/https","libdd-dogstatsd-client?/https" ]
fips = ["libdd-common/fips", "libdd-capabilities-impl/fips", "libdd-shared-runtime/fips", "libdd-telemetry?/fips", "libdd-dogstatsd-client?/fips"]
