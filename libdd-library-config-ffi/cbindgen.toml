language = "C"
cpp_compat = true
tab_width = 2
header = """// Copyright 2021-Present Datadog, Inc. https://www.datadoghq.com/
// SPDX-License-Identifier: Apache-2.0
"""
include_guard = "DDOG_LIBRARY_CONFIG_H"
style = "both"
pragma_once = true

no_includes = true
includes = ["common.h"]

[export]
prefix = "ddog_"
renaming_overrides_prefixing = true
# These types are already defined in common.h; exclude to avoid redefinition
# when cbindgen picks up the ffi_types module (no_std fallback types).
exclude = ["Slice_CChar", "CharSlice", "CStr", "Error", "Vec_U8"]


[export.mangle]
rename_types = "PascalCase"

[export.rename]
"ParseTagsResult" = "ddog_Vec_Tag_ParseResult"
"PushTagResult" = "ddog_Vec_Tag_PushResult"
"FILE" = "FILE"

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"

[fn]
must_use = "DDOG_CHECK_RETURN"

[parse]
parse_deps = true
include = ["libdd-common", "libdd-common-ffi", "libdd-library-config"]
