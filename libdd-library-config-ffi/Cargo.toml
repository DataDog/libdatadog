[package]
name = "libdd-library-config-ffi"
version = "0.0.2"
edition = "2021"
publish = false

[lib]
crate-type = ["staticlib", "cdylib", "lib"]
bench = false

[features]
default = ["std", "cbindgen", "catch_panic"]
std = [
    "dep:libdd-common",
    "dep:libdd-common-ffi",
    "dep:anyhow",
    "libdd-library-config/std",
]
cbindgen = ["std", "build_common/cbindgen", "libdd-common-ffi/cbindgen"]
catch_panic = []

[dependencies]
libdd-common = { path = "../libdd-common", optional = true }
libdd-common-ffi = { path = "../libdd-common-ffi", default-features = false, optional = true }
libdd-library-config = { path = "../libdd-library-config", default-features = false }
anyhow = { version = "1.0", default-features = false, optional = true }
constcat = "0.4.1"

[build-dependencies]
build_common = { path = "../build-common" }

[dev-dependencies]
tempfile = { version = "3.3" }
