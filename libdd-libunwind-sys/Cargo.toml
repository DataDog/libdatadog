[package]
name = "libdd-libunwind-sys"
edition = "2021"
version = "0.1.0"
rust-version = "1.84.1"
license = "Apache-2.0"
publish = false
links = "unwind"  # Tells Cargo this crate links to libunwind (prevents multiple builds)

[lib]
crate-type = ["lib"]
bench = false

[dependencies]
paste = "1.0"
libc = "0.2"

[build-dependencies]
cc = "1.0"
