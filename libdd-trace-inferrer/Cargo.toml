[package]
name = "libdd-trace-inferrer"
version = "1.0.0"
description = "Infers Datadog trace spans from JSON payloads (AWS Lambda triggers, etc.)"
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-trace-inferrer"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-trace-inferrer"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tracing = { version = "0.1", default-features = false }

[dev-dependencies]

[lib]
bench = false

[features]
default = []
test-utils = []
