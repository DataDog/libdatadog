[package]
name = "libdd-dogstatsd-client"
description = "A dogstatsd client for sending metrics to a dogstatsd server."
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-dogstatsd-client"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-dogstatsd-client"
rust-version.workspace = true
edition.workspace = true
version = "4.0.0"
license.workspace = true

[lib]
bench = false

[dependencies]
libdd-common = { version = "5.1.0", path = "../libdd-common", default-features = false }
cadence = "1.3.0"
serde = { version = "1.0", features = ["derive", "rc"] }
tracing = { version = "0.1", default-features = false }
anyhow = { version = "1.0" }
http = "1.1"
libdd-shared-runtime = { version = "2.0.0", path = "../libdd-shared-runtime", default-features = false, optional = true }
tokio = { version = "1.23", features = ["sync"], optional = true }
async-trait = { version = "0.1", optional = true }

[features]
default = ["https"]
https = ["libdd-common/https"]
fips = ["libdd-common/fips"]
shared-runtime = ["dep:libdd-shared-runtime", "dep:tokio", "dep:async-trait"]

[dev-dependencies]
tokio = {version = "1.23", features = ["rt", "time", "test-util", "rt-multi-thread"], default-features = false}
