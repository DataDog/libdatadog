[package]
edition = "2021"
name = "libdd-remote-config"
version = "2.0.0"
rust-version.workspace = true
license.workspace = true
authors.workspace = true
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-remote-config"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-remote-config"
description = "Datadog Remote Configuration client and config parsers"

[features]
default = ["client", "https", "agentless"]
agentless = ["tuf", "chrono", "client", "https"]
client = [
    "libdd-trace-protobuf",
    "http-body-util",
    "http",
    "base64",
    "sha2",
    "uuid",
    "futures-util",
    "tokio",
    "tokio-util",
    "manual_future",
    "time",
    "tracing",
]

regex-lite = ["libdd-common/regex-lite"]
# Enable HTTPS support in the fetcher (rustls + ring via libdd-common).
https = ["libdd-common/https"]
# FIPS-compliant crypto provider (aws-lc-rs via libdd-common). Unix only.
fips = ["libdd-common/fips"]
test = ["hyper/server", "hyper-util"]

[dependencies]
anyhow = { version = "1.0" }
libdd-common = { path = "../libdd-common", version = "5.1.0", default-features = false }
libdd-capabilities = { path = "../libdd-capabilities", version = "2.1.0" }
libdd-capabilities-impl = { version = "3.0.0", path = "../libdd-capabilities-impl", default-features = false }
libdd-trace-protobuf = { path = "../libdd-trace-protobuf", version = "4.0.0", optional = true }
hyper = { workspace = true, optional = true, default-features = false }
http-body-util = { version = "0.1", optional = true }
http = { version = "1.1", optional = true }
base64 = { version = "0.22.1", optional = true }
sha2 = { version = "0.10", optional = true }
uuid = { version = "1.7.0", features = ["v4"], optional = true }
futures-util = { version = "0.3", optional = true }
tokio = { version = "1.36.0", optional = true }
tokio-util = { version = "0.7.10", optional = true }
manual_future = { version = "0.1.1", optional = true }
time = { version = "0.3", features = [
    "parsing",
    "serde",
    "formatting",
], optional = true }
tracing = { version = "0.1", default-features = false, optional = true }
serde = "1.0"
serde_json = { version = "1.0", features = ["raw_value"] }
serde_with = "3"
thiserror = "2"
hashbrown = "0.15"
# branch = "opw-develop"
tuf = { git = "https://github.com/DataDog/rust-tuf/", rev = "42fc5b6ac1fe13a997b0e4d0235f0964c18da3fa", default-features = false, optional = true }
chrono = { version = "0.4", default-features = false, features = ["clock"], optional = true }
prost = "0.14.1"
futures = { version = "0.3", features = ["executor"] }
# `EnumIter` for external consumers to make struct available to runtime
strum = { version = "0.26", default-features = false }
strum_macros = "0.26"

# Test feature
hyper-util = { workspace = true, features = ["service"], optional = true }

[dev-dependencies]
futures = "0.3"
libdd-remote-config = { path = ".", features = ["test"] }

[lib]
bench = false
