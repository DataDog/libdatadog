[package]
name = "libdd-profiling-heap-gotter"
version = "0.1.0"
description = "GOT-table interposition that routes a running process's allocator through libdd-profiling-heap-sampler."
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-profiling-heap-gotter"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-profiling-heap-gotter"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[lib]
crate-type = ["lib", "cdylib"]
bench = false

[features]
# Forward live-heap (retained-heap) tracking down to the sampler
live-heap = ["libdd-profiling-heap-sampler/live-heap"]

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"
libdd-profiling-heap-sampler = { path = "../libdd-profiling-heap-sampler" }

[target.'cfg(target_os = "linux")'.dev-dependencies]
libc = "0.2"
libdd-profiling-heap-sampler = { path = "../libdd-profiling-heap-sampler" }
serial_test = "3.2"
