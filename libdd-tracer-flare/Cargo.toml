[package]
name = "libdd-tracer-flare"
version = "1.0.0"
description = "Rust library for collecting and transmitting Datadog tracer diagnostic flares via remote configuration."
rust-version.workspace = true
edition.workspace = true
license.workspace = true
autobenches = false
publish = false
authors.workspace = true
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-tracer-flare"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-tracer-flare"

[dependencies]
anyhow = "1.0"
datadog-remote-config = { path = "../datadog-remote-config", default-features = false }
libdd-common = { version = "3.0.2", path = "../libdd-common" }
libdd-trace-utils = { version = "3.0.1", path = "../libdd-trace-utils" }
http = "1"
bytes = "1.11.1"
tokio = { version = "1.36.0", features = ["time"] }
serde_json = "1.0"
zip = { version = "4.0.0", default-features = false, features = ["deflate"] }
walkdir = "2.4"
tempfile = "3.8"

[lib]
bench = false

[dev-dependencies]
datadog-remote-config = { path = "../datadog-remote-config", features = ["test"] }
httpmock = "0.8.0-alpha.1"
libdd-trace-utils = { path = "../libdd-trace-utils", features = ["test-utils"] }
tokio = { version = "1.36.0", features = ["time", "macros", "rt"] }

[features]
default = ["listener"]
listener = ["datadog-remote-config/client"]
