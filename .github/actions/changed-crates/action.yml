name: 'Get Changed Crates'
description: 'Detects which Rust crates have changed files in a PR or push'

outputs:
  crates:
    description: 'JSON array of changed crates with name, version, path and manifest'
    value: ${{ steps.detect.outputs.crates }}
  crates_count:
    description: 'Number of changed crates'
    value: ${{ steps.detect.outputs.crates_count }}
  affected_crates:
    description: 'Affected crates by the changes'
    value: ${{ steps.detect.outputs.affected_crates }}
  affected_crates_count:
    description: 'Number of affected crates by the changes'
    value: ${{ steps.detect.outputs.affected_crates_count }}
  base_ref:
    description: 'The base ref used for comparison'
    value: ${{ steps.detect.outputs.base_ref }}

runs:
  using: 'composite'
  steps:
    - name: Set up Rust
      shell: bash
      run: rustup install stable && rustup default stable

    - name: Fetch all branches
      shell: bash
      run: |
        git fetch --all
        echo "Available branches:"
        git branch -a

    - name: Build change reporter
      shell: bash
      run: |
        cd ${{ github.action_path }}/..
        cargo build --release -p ci-crates

    - name: Run change reporter
      id: detect
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_REF: ${{ github.base_ref }}
      run: |
        ${{ github.action_path }}/../target/release/changed-crates $PR_BASE_REF
