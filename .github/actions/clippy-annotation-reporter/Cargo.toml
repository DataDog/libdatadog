[package]
name = "clippy-annotation-reporter"
rust-version = "1.78.0"
edition = "2021"
version = "0.1.0"

[dependencies]
clap = { version = "4.3", features = ["derive", "env"] }
octocrab = "0.28"
anyhow = "1.0"
regex = "1.9"
tokio = { version = "1", features = ["full"] }
serde_json = "1.0"
log = "0.4"
env_logger = "0.10"

[dev-dependencies]
mockall = "0.11"

# TODO: Remove this when move to separate repo
[workspace]
members = ["."]
