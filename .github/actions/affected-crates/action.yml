name: 'Get Affected Crates'
description: 'Computes all crates affected (direct + transitive) by changes in a PR or push'

inputs:
  include-non-publishable:
    description: 'Include crates with publish = false'
    required: false
    default: 'false'
  base-ref:
    description: 'Base ref for comparison (defaults to PR base or HEAD~1 for push)'
    required: false
    default: ''

outputs:
  affected_crates:
    description: 'JSON array of affected crates with name, version, path and manifest'
    value: ${{ steps.detect.outputs.affected_crates }}
  affected_crates_count:
    description: 'Number of affected crates'
    value: ${{ steps.detect.outputs.affected_crates_count }}
  has_changes:
    description: '"true" if any crates are affected'
    value: ${{ steps.detect.outputs.has_changes }}

runs:
  using: 'composite'
  steps:
    - name: Cache [ci-crates build]
      uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # 2.8.1
      with:
        workspaces: .github/actions
        cache-targets: true

    - name: Build ci-crates
      shell: bash
      run: |
        cd ${{ github.action_path }}/..
        cargo build --release -p ci-crates

    - id: detect
      name: Detect affected crates
      shell: bash
      env:
        INPUT_INCLUDE_NON_PUBLISHABLE: ${{ inputs.include-non-publishable }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        RUST_LOG: info
      run: |
        ${{ github.action_path }}/../target/release/affected-crates
