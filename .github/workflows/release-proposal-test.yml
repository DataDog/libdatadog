name: Release - Test a release proposal PR changes using dd-trace-rs
on:
  push:
    branches:
      - release-proposal/**
      - release-proposal-testing/**
  pull_request:
      branches:
        - release/**
        - release-testing/**
jobs:
  package-and-upload-crates:
    permissions:
      id-token: write # Enable OIDC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 4.2.2
        with:
          fetch-depth: 0
          # Use PR head so git diff origin/main...HEAD matches commits on the proposal branch (not the merge commit).
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Fetch main for three-dot diff
        run: git fetch origin main

      # Crates = workspace packages whose Cargo.toml changed vs origin/main (git diff main...branch).
      # Pathspec ':(glob)**/Cargo.toml' keeps the diff small; map each path to a package via manifest_path.
      # (Release proposals almost always bump versions in Cargo.toml; .rs-only changes here would not add a crate.)
      - name: Package crates changed vs main
        run: |
          set -euo pipefail
          DIFF_RANGE="origin/main...HEAD"
          echo "Changed Cargo.toml files ($DIFF_RANGE):"
          git diff --name-only "$DIFF_RANGE" -- ':(glob)**/Cargo.toml' | head -50
          FILES_JSON=$(git diff --name-only "$DIFF_RANGE" -- ':(glob)**/Cargo.toml' | jq -R -s 'split("\n") | map(select(length > 0))')
          if [ "$(echo "$FILES_JSON" | jq 'length')" -eq 0 ]; then
            echo "No Cargo.toml changes vs origin/main in this range; nothing to package." >&2
            exit 1
          fi
          
          CHANGED_CRATES=$(cargo metadata --format-version=1 --no-deps | jq --argjson files "$FILES_JSON" '
            .workspace_root as $root |
            .packages as $pkgs |
            ($files | map(select(. != "Cargo.toml"))) as $tomls |
            $tomls | map(
              . as $f |
              ($root + "/" + $f) as $abspath |
              ([$pkgs[] | select(.manifest_path == $abspath)] | .[0].name // empty)
            ) | map(select(length > 0)) | unique
          ')

          echo "Workspace crates touched by diff (via Cargo.toml): $CHANGED_CRATES"
          PACKAGES_JSON=$(echo "$CHANGED_CRATES" | jq '
            [.[] | select(
              (. | test("^libdd-.*-ffi$") | not) and
              (. | test("^datadog-") | not) and
              (. | test("^(libdd-crashtracker|bin_tests|tools|sidecar_mockgen|cc_utils|spawn_worker|symbolizer-ffi|test_spawn_from_lib|build-common|builder)$") | not)
            )] |
            if length == 0 then error("no packages to package after applying excludes (or no mapped workspace crates in diff)") else . end
          ')
          echo "Packages to run cargo package on:"
          echo "$PACKAGES_JSON" | jq .
          mapfile -t PACKAGES < <(echo "$PACKAGES_JSON" | jq -r '.[]')
          PKG_ARGS=()
          for p in "${PACKAGES[@]}"; do
            PKG_ARGS+=(-p "$p")
          done
          cargo package "${PKG_ARGS[@]}" --all-features

      - name: Upload crates
        uses: actions/upload-artifact@v4
        with:
          name: release-proposal-test-crates
          path: |
            target/package/*.crate
          retention-days: 1

  compile-dd-trace-rs:
    permissions:
      id-token: write # Enable OIDC
    runs-on: ubuntu-latest
    needs: package-and-upload-crates
    strategy:
      matrix:
        version: ["datadog-opentelemetry-v0.3.2", "datadog-opentelemetry-v0.3.1"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 4.2.2
        with:
          fetch-depth: 0
          repository: DataDog/dd-trace-rs
          ref: ${{ matrix.version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Download release data
        uses: actions/download-artifact@v4
        with:
          name: release-proposal-test-crates
          path: /tmp/release-proposal-test-crates

      - name: Compile dd-trace-rs
        run: |
          CRATES_DIR="/tmp/release-proposal-test-crates"
          TOML_FILE="$(realpath Cargo.toml)"
          
          # if CRATES_DIR ends with a slash, remove it
          if [[ "$CRATES_DIR" == */ ]]; then
            CRATES_DIR="${CRATES_DIR%/}"
          fi

          # Get libdd-* direct dependencies only from the root manifest package.
          LIBDD_DEPENDENCIES=$(cargo metadata --manifest-path "$TOML_FILE" --format-version=1 --no-deps | jq -c '[.packages[] | select(.name == "datadog-opentelemetry") | .dependencies[]?.name | select(startswith("libdd-"))] | unique')

          echo "LIBDD_DEPENDENCIES: $LIBDD_DEPENDENCIES"

          PATCH_ARGS=()

          # Unzip crates and build a patch expression for local path overrides.
          # patch all the crates to patch transitive dependencies
          for crate in "$CRATES_DIR"/*.crate; do
            tar -xzvf "$crate" -C "$CRATES_DIR" > /dev/null

            CRATE_PATH=$(echo "$crate" | sed 's/.*\///' | sed 's/\.crate//')
            CRATE_TOML_FILE="$CRATES_DIR/$CRATE_PATH/Cargo.toml"
            
            CRATE_NAME=$(cargo metadata --manifest-path "$CRATE_TOML_FILE" --format-version=1 --no-deps | jq -r '[.packages[].name][0]')
            
            echo "Patching crate: $CRATE_NAME"
            PATCH_ARGS+=("--config" "patch.crates-io.$CRATE_NAME.path=\"$CRATES_DIR/$CRATE_PATH\"")
          done

          echo "Build dd-trace-rs with patch args: ${PATCH_ARGS[*]}"
          
          cargo update "${PATCH_ARGS[@]}"

          echo "--------------------------------"
          echo "Cargo tree: "
          cargo tree -d -e normal --workspace --all-features "${PATCH_ARGS[@]}"
          echo ""

          echo "--------------------------------"
          echo "Duplicated dependencies: "
          cargo tree -d -e normal --workspace --all-features --prefix none "${PATCH_ARGS[@]}" | grep "libdd-" | grep -vF '(*)' | sort | uniq
          echo ""

          echo "--------------------------------"
          echo "Building workspace:"
          cargo build --release --workspace --all-features "${PATCH_ARGS[@]}"


