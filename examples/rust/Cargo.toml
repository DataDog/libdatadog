[package]
name = "unwind_example"
version = "0.1.0"
edition = "2021"

[dependencies]
libc = "0.2"
backtrace = { path = "/opt/backtrace-rs" }

[[bin]]
name = "unwind_c"
path = "src/unwind_c.rs"

[[bin]]
name = "unwind_backtrace"
path = "src/unwind_backtrace.rs"

[[bin]]
name = "unwind_libunwind"
path = "src/unwind_libunwind.rs"

[[bin]]
name = "unwind_std"
path = "src/unwind_std.rs"

[[bin]]
name = "unwind_framehop"
path = "src/unwind_framehop.rs"

[workspace]
