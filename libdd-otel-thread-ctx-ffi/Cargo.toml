[package]
name = "libdd-otel-thread-ctx-ffi"
version = "1.0.0"
description = "FFI bindings for the OTel thread-level context publisher"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[lib]
crate-type = ["staticlib", "cdylib", "lib"]
bench = false

[dependencies]
libdd-common-ffi = { path = "../libdd-common-ffi", default-features = false }
libdd-otel-thread-ctx = { path = "../libdd-otel-thread-ctx", default-features = false }

[features]
default = ["cbindgen", "tls-storage"]
cbindgen = ["build_common/cbindgen", "libdd-common-ffi/cbindgen"]
tls-storage = ["libdd-otel-thread-ctx/tls-storage"]
sanity-check = ["libdd-otel-thread-ctx/sanity-check"]

[dev-dependencies]
libdd-otel-thread-ctx = { path = "../libdd-otel-thread-ctx", features = [
    "sanity-check",
    "test-utils",
] }

[build-dependencies]
build_common = { path = "../build-common" }
