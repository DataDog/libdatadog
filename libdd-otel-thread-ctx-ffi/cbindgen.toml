language = "C"
cpp_compat = true
tab_width = 2
header = """// Copyright 2026-Present Datadog, Inc. https://www.datadoghq.com/
// SPDX-License-Identifier: Apache-2.0
"""
include_guard = "DDOG_OTEL_THREAD_CTX_H"
style = "both"
pragma_once = true
no_includes = true
includes = ["common.h"]
sys_includes = ["stdbool.h", "stddef.h", "stdint.h"]

[defines]
"target_os = linux" = "__linux__"

[parse]
parse_deps = true
# Parse the canonical thread-context crate so cbindgen emits the exact `ThreadContextRecord`
# layout used by the Rust writer. The FFI crate re-exports that type instead of maintaining a
# C-facing mirror.
include = ["libdd-common-ffi", "libdd-otel-thread-ctx"]

[export]
prefix = "ddog_"
renaming_overrides_prefixing = true

[export.mangle]
rename_types = "PascalCase"

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"
