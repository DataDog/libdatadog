[package]
name = "libdd-http-client-lite"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Allocation-free HTTP primitives for caller-provided transports"
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-http-client-lite"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-http-client-lite"
readme = "README.md"

[lib]
bench = false

[lints]
workspace = true

[features]
default = []
alloc = ["reqwless/alloc"]
libc_dns = ["dep:libc"]
rustix-tcp = ["dep:rustix"]
std = ["alloc", "embedded-io/std", "embedded-io-async/std", "rustix?/std"]

[dependencies]
embedded-io = { version = "0.6", default-features = false }
embedded-io-async = { version = "0.6", default-features = false }
embedded-nal-async = { version = "0.8.0", default-features = false }
libc = { version = "0.2", default-features = false, optional = true }
reqwless = { version = "0.13.0", default-features = false }
rustix = { version = "1.1.3", features = ["net"], default-features = false, optional = true }

[[example]]
name = "rustix_sync_client"
required-features = ["rustix-tcp", "std"]

[[example]]
name = "rustix_async_client"
required-features = ["rustix-tcp", "std"]
