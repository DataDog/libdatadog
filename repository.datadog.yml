---
# This file defines overrides for the merge queue configuration.
# See https://datadoghq.atlassian.net/wiki/spaces/DEVX/pages/3121612126/MergeQueue#Configuration-Specification for defaults.
schema-version: v1
kind: mergequeue
merge_method: squash
---
schema-version: v1
kind: mergegate
rules:
  - require: pull-request-freshness
    max_age: 10d
  - require: all-files-are-owned
  - require: commit-signatures
    excluded_emails:
      # dd-octo-sts pool of apps (version-bump bots)
      - '200755185+dd-octo-sts[bot]@users.noreply.github.com'
      - '256648585+dd-octo-sts-6cbbf8[bot]@users.noreply.github.com'
      - '256648796+dd-octo-sts-6bb5b9[bot]@users.noreply.github.com'
      - '256648685+dd-octo-sts-4191dd[bot]@users.noreply.github.com'
      - '256648544+dd-octo-sts-c33ac5[bot]@users.noreply.github.com'
      - '256648608+dd-octo-sts-09fbc5[bot]@users.noreply.github.com'
      - '256648516+dd-octo-sts-98cdbc[bot]@users.noreply.github.com'
      - '256648721+dd-octo-sts-03ec73[bot]@users.noreply.github.com'
      - '256648829+dd-octo-sts-0c48d7[bot]@users.noreply.github.com'
      - '256648753+dd-octo-sts-019303[bot]@users.noreply.github.com'
---
schema-version: v2
kind: adms
auto-version-updates:
  disabled:
    reason: Auto-generated PRs fail to compile on Rust. Dependency updates must be deliberate. We already monitor dependabot for security updates.
