[package]
name = "libdd-log-ffi"
rust-version.workspace = true
edition.workspace = true
version.workspace = true
license.workspace = true
publish = false

[lib]
crate-type = ["lib", "staticlib", "cdylib"]
bench = false

[features]
default = ["cbindgen", "expanded_builder_macros"]
cbindgen = ["build_common/cbindgen", "libdd-common-ffi/cbindgen", "expanded_builder_macros"]
expanded_builder_macros = []
regex-lite = ["libdd-common-ffi/regex-lite"]

[build-dependencies]
build_common.workspace = true

[dependencies]
libdd-log = { path = "../libdd-log" }
libdd-common-ffi = { path = "../libdd-common-ffi" }
