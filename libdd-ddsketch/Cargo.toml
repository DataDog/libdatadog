[package]
name = "libdd-ddsketch"
version = "1.1.0"
description = "Minimal implementation of Datadog's DDSketch"
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-ddsketch"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-ddsketch"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
autobenches = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
prost = "0.14.1"

[build-dependencies]
prost-build = { version = "0.14.1", optional = true  }
protoc-bin-vendored = { version = "3.0.0", optional = true }

[dev-dependencies]
criterion = "0.5"
rand = "0.8.5"
rand_chacha = "0.3.1"

[features]
generate-protobuf = ["dep:prost-build", "dep:protoc-bin-vendored"]

[lib]
bench = false

[[bench]]
name = "ddsketch_bench"
harness = false
path = "benches/ddsketch_bench.rs"
