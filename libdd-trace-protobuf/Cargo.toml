[package]
name = "libdd-trace-protobuf"
version = "4.0.0"
description = "Protobuf utils for Datadog's traces serialization"
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-trace-protobuf"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-trace-protobuf"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
bench = false

[dependencies]
bolero = { version = "0.13.4", optional = true }
prost = "0.14.1"
serde = { workspace = true, features = ["derive"] }
serde_bytes = "0.11.9"

[build-dependencies]
prost-build = { workspace = true, features = ["format"], optional = true }
protoc-bin-vendored = { workspace = true, optional = true }

[features]
generate-protobuf = ["dep:prost-build", "dep:protoc-bin-vendored"]
fuzzing = ["dep:bolero"]

[dev-dependencies]
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }