[package]
name = "libdd-otel-thread-ctx"
version = "1.0.0"
description = "OTel thread-level context publisher for Datadog profiling (OTEP #4947)"
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-otel-thread-ctx"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-otel-thread-ctx"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[lib]
crate-type = ["lib"]
bench = false

[dependencies]
anyhow = { version = "1.0", optional = true }
elf = { version = "0.7", optional = true }
object = { version = "0.36", default-features = false, features = ["archive", "read_core"], optional = true }
sha2 = { version = "0.10", optional = true }

[features]
sanity-check = ["dep:elf", "dep:anyhow"]
# Test helpers used by this crate's own tests and `libdd-otel-thread-ctx-ffi`'s
# integration tests.
test-utils = ["dep:elf", "dep:object", "dep:sha2"]
# Gate for the gen_tls_shim_hash binary. Do not build it by default; it's very
# rarely needed (and maybe won't ever be): only if the corresponding test is
# failing one day, and we need to update the TLSDESC inline assembly to match
# what newer versions of clang generate.
gen-tls-shim-hash = ["test-utils"]

# Dev tool to regenerate the TLSDESC golden hash for tests.
[[bin]]
name = "gen_tls_shim_hash"
required-features = ["gen-tls-shim-hash"]

[dev-dependencies]
libdd-otel-thread-ctx = { path = ".", features = ["test-utils"] }
