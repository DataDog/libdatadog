[package]
name = "libdd-profiling-heap-allocator"
version = "0.1.0"
description = "Rust GlobalAlloc wrapper that drives libdd-profiling-heap-sampler."
homepage = "https://github.com/DataDog/libdatadog/tree/main/libdd-profiling-heap-allocator"
repository = "https://github.com/DataDog/libdatadog/tree/main/libdd-profiling-heap-allocator"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[lib]
bench = false

[features]
# Forward live-heap (retained-heap) tracking down to the sampler. Off by
# default: a bare SampledAllocator does allocation profiling only. Enable
# to flag allocations and sample frees. See libdd-profiling-heap-sampler.
live-heap = ["libdd-profiling-heap-sampler/live-heap"]

[dependencies]
libdd-profiling-heap-sampler = { path = "../libdd-profiling-heap-sampler" }

[dev-dependencies]
criterion = "0.5.1"

[[bench]]
name = "sampler_overhead"
harness = false
